services:
  test-db:
    image: postgres:16-alpine
    container_name: graph-rag-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: graph_rag_test
    ports:
      - "15432:5432"

  test-redis:
    image: redis:7-alpine
    container_name: graph-rag-test-redis
    ports:
      - "16379:6379"

  test-qdrant:
    image: qdrant/qdrant:latest
    container_name: graph-rag-test-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"

  test-neo4j:
    image: neo4j:5-community
    container_name: graph-rag-test-neo4j
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "17474:7474"
      - "17687:7687"

  test-minio:
    image: minio/minio:latest
    container_name: graph-rag-test-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
